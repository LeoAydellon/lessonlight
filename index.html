<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LessonLight — Bible lessons in a minute</title>
<meta name="description" content="Complete, ready-to-teach Bible lessons in about a minute — discussion questions, activities, the whole thing. For Sunday school and Christian classrooms. $19."/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="LessonLight — Bible lessons in a minute"/>
<meta property="og:description" content="Complete, ready-to-teach Bible lessons in about a minute — discussion questions, activities, the whole thing. For Sunday school and Christian classrooms. $19."/>
<meta property="og:url" content="https://lessonlight.onrender.com"/>
<meta name="twitter:card" content="summary_large_image"/>
<style>
  :root { --ink:#2a2320; --gold:#b8893a; --bg:#faf6ef; --card:#fff; }
  * { box-sizing:border-box; }
  body { font-family:Georgia,'Times New Roman',serif; background:var(--bg); color:var(--ink); margin:0; padding:0; }
  header { text-align:center; padding:28px 16px 8px; }
  header h1 { margin:0; font-size:2rem; letter-spacing:.5px; }
  header p { margin:6px 0 0; color:#7a6a55; font-style:italic; }
  .wrap { max-width:820px; margin:0 auto; padding:16px; }
  .card { background:var(--card); border:1px solid #e7ddca; border-radius:12px; padding:20px; margin:16px 0; box-shadow:0 2px 10px rgba(0,0,0,.04); }
  label { display:block; font-size:.85rem; color:#7a6a55; margin:10px 0 4px; }
  input,select,textarea { width:100%; padding:10px; border:1px solid #d8ccb4; border-radius:8px; font-family:inherit; font-size:1rem; background:#fffdf8; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:180px; }
  button { background:var(--gold); color:#fff; border:0; padding:13px 22px; border-radius:8px; font-size:1.05rem; font-family:inherit; cursor:pointer; margin-top:16px; }
  button:disabled { opacity:.5; cursor:wait; }
  #out { white-space:pre-wrap; line-height:1.55; }
  #out h2 { color:var(--gold); border-bottom:1px solid #eee3cc; padding-bottom:4px; margin-top:22px; font-size:1.2rem; }
  .bar { display:flex; gap:10px; }
  .bar button { background:#6b5a44; }
  .muted { color:#9a8a70; font-size:.8rem; text-align:center; margin-top:10px; }
  @media print { header,form,.bar,.muted { display:none; } .card{border:0;box-shadow:none;} }
</style>
<meta property="og:image" content="https://lessonlight.onrender.com/og.png"/>
<meta name="twitter:image" content="https://lessonlight.onrender.com/og.png"/>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"EducationApplication","name":"LessonLight","description":"AI Bible lesson generator for Sunday school & Christian classrooms","url":"https://lessonlight.onrender.com","applicationCategory":"BusinessApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"19","priceCurrency":"USD"}}</script>
</head>
<body>
<header>
  <h1>✨ LessonLight</h1>
  <p>A complete, ready-to-teach Bible lesson — in under a minute.</p>
</header>
<div class="wrap">
  <form class="card" id="f">
    <div class="row">
      <div>
        <label>Age group</label>
        <select name="age">
          <option>preschool (3-5)</option>
          <option selected>elementary (6-10)</option>
          <option>preteen (11-12)</option>
          <option>teen (13-17)</option>
          <option>adult</option>
        </select>
      </div>
      <div>
        <label>Lesson length</label>
        <select name="length"><option>15 minutes</option><option selected>30 minutes</option><option>45 minutes</option><option>60 minutes</option></select>
      </div>
      <div>
        <label>Class size</label>
        <select name="size"><option>small (5-12)</option><option>medium (13-25)</option><option>large (25+)</option><option>one-on-one</option></select>
      </div>
    </div>
    <label>Bible passage or topic</label>
    <input name="passage" placeholder="e.g. The Good Samaritan (Luke 10:25-37), or 'forgiveness'"/>
    <label>Tone / denomination notes (optional)</label>
    <input name="tone" placeholder="e.g. non-denominational, gentle; or 'Baptist Sunday school'"/>
    <button type="submit" id="go">Generate Lesson</button>
  </form>

  <div class="card" id="paywall" style="display:none; text-align:center;">
    <p style="margin:0 0 6px; font-size:1.05rem;">🔓 <strong id="pwprice">Unlock</strong> for unlimited ready-to-teach lessons.</p>
    <p class="muted" style="margin:0 0 10px;">One-time payment · secure checkout by Stripe</p>
    <button id="unlockBtn" type="button">Unlock now</button>
  </div>

  <div class="card" id="result" style="display:none">
    <div class="bar">
      <button onclick="window.print()">🖨️ Print / Save PDF</button>
      <button onclick="copyOut()">📋 Copy</button>
    </div>
    <div id="out"></div>
  </div>
  <p class="muted">MVP demo · generated lessons are a starting point — review before teaching.</p>
</div>
<script>
const $ = id => document.getElementById(id);
let CFG = { stripe:false }, UNLOCK = localStorage.getItem('ll_unlock') || '';

function mdToHtml(md){
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/^## (.*)$/gm,'<h2>$1</h2>')
    .replace(/^\*\*(.*?)\*\*/gm,'<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.*)$/gm,'• $1');
}
function copyOut(){ navigator.clipboard.writeText($('out').dataset.raw||''); }

function locked(){ return CFG.stripe && !UNLOCK; }
function refreshPaywall(){ $('paywall').style.display = locked() ? 'block' : 'none'; }

async function init(){
  try { CFG = await (await fetch('/api/config')).json(); } catch {}
  if (CFG.priceLabel) $('pwprice').textContent = 'Unlock (' + CFG.priceLabel + ')';
  // returning from Stripe checkout? verify payment + store the unlock
  const u = new URL(location.href), paid = u.searchParams.get('paid');
  if (paid){
    try{
      const r = await (await fetch('/api/unlock-status?session_id='+encodeURIComponent(paid))).json();
      if (r.paid){ UNLOCK = paid; localStorage.setItem('ll_unlock', paid); }
    }catch{}
    u.searchParams.delete('paid'); history.replaceState({}, '', u.pathname);
  }
  refreshPaywall();
}

async function startCheckout(){
  const b = $('unlockBtn'); b.disabled = true; b.textContent = 'Opening checkout…';
  try{
    const r = await (await fetch('/api/checkout',{method:'POST'})).json();
    if (r.url) location.href = r.url; else throw new Error(r.error||'checkout failed');
  }catch(err){ alert('Error: '+err.message); b.disabled=false; b.textContent='Unlock now'; }
}
$('unlockBtn').addEventListener('click', startCheckout);

$('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if (locked()){ refreshPaywall(); $('paywall').scrollIntoView({behavior:'smooth'}); return; }
  const go=$('go'); go.disabled=true; go.textContent='Generating…';
  const data=Object.fromEntries(new FormData(e.target).entries());
  if (UNLOCK) data.session_id = UNLOCK;
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const j=await r.json();
    if (r.status===402 || j.needUnlock){ UNLOCK=''; localStorage.removeItem('ll_unlock'); refreshPaywall(); $('paywall').scrollIntoView({behavior:'smooth'}); throw new Error('Please unlock to generate.'); }
    if(!j.ok) throw new Error(j.error||'failed');
    const out=$('out'); out.dataset.raw=j.lesson; out.innerHTML=mdToHtml(j.lesson);
    $('result').style.display='block'; $('result').scrollIntoView({behavior:'smooth'});
  }catch(err){ alert('Error: '+err.message); }
  go.disabled=false; go.textContent='Generate Lesson';
});

init();
</script>
</body>
</html>
